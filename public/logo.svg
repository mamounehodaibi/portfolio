  <text x="340" y="222" text-anchor="middle" font-family="'Space Grotesk', 'Manrope', sans-serif" font-size="96" font-weight="700" letter-spacing="-4" fill="url(#textgrad)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Space Grotesk&quot;, Manrope, sans-serif;font-size:96px;font-weight:700;text-anchor:middle;dominant-baseline:auto">MH</text>

