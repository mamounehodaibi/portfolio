<svg viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg" width="100%">
  <defs>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E24B4A" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#E24B4A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E24B4A" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#E24B4A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="textgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cccccc"/>
    </linearGradient>
    <linearGradient id="dotgrad" x1="0%" y1="0%" x2="100%" y2="100%">
